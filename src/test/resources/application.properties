# Test configuration - overrides main application.properties
spring.application.name=OrderManagementService-Test

# Disable MongoDB auto-configuration for unit tests
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.mongo.MongoRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

spring.data.mongodb.uri=mongodb://localhost:27017/test
spring.data.mongodb.database=test

# Disable SSL for tests
spring.data.mongodb.ssl.enabled=false

# Disable Thymeleaf template check
spring.thymeleaf.check-template-location=false

# Mock Stripe configuration
stripe.secretKey=sk_test_MOCK_KEY_FOR_TESTS
stripe.publicKey=pk_test_MOCK_KEY_FOR_TESTS
stripe.successUrl=http://localhost:8081/api/stripe/success
stripe.cancelUrl=http://localhost:8081/api/stripe/cancel

# Server port
server.port=0
